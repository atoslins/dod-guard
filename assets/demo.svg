<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" width="920" height="620" role="img" aria-label="DoD-Guard demo terminal">
  <title>DoD-Guard /dod:verify — FAIL then PASS after fix</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11161e"/>
      <stop offset="1" stop-color="#0c1018"/>
    </linearGradient>
  </defs>

  <!-- window chrome -->
  <rect x="0" y="0" width="920" height="620" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="920" height="32" rx="10" fill="#1a2030"/>
  <rect x="0" y="22" width="920" height="10" fill="#1a2030"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="16" r="6" fill="#27c93f"/>
  <text x="460" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#5a6478">claude-code ▸ my-api ▸ /dod:verify</text>

  <!-- body text -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#cbd5e1">

    <text x="20" y="60"><tspan fill="#7dd3a8">$</tspan> /dod:verify</text>

    <text x="20" y="84" fill="#94a3b8">═════════════════════════════════════════════════════════════════════</text>
    <text x="20" y="102" fill="#e6edf6" font-weight="700">DoD-Guard verify  (project: my-api, runner: jest)</text>
    <text x="20" y="120" fill="#94a3b8">═════════════════════════════════════════════════════════════════════</text>

    <text x="20" y="144"><tspan fill="#fbbf24">[1/5]</tspan> Snapshot      branch=feature/refund  HEAD=3f4a2e1  dirty=yes</text>
    <text x="20" y="166"><tspan fill="#fbbf24">[2/5]</tspan> Stubs         <tspan fill="#ef4444">✘ 2 issue(s):</tspan></text>
    <text x="40" y="184" fill="#ef9999">  - high  src/refund.ts:14  todo_marker:   // TODO: integrate gateway</text>
    <text x="40" y="202" fill="#ef9999">  - high  src/refund.ts:18  empty_function: refund() returns null</text>
    <text x="20" y="224"><tspan fill="#fbbf24">[3/5]</tspan> Tests         24 passed, 0 failed (4.3s)</text>
    <text x="20" y="242"><tspan fill="#fbbf24">[4/5]</tspan> E2E probe     not_applicable — no live server</text>
    <text x="20" y="260"><tspan fill="#fbbf24">[5/5]</tspan> Verdict       <tspan fill="#ef4444">═══════════════════════════════════════</tspan></text>
    <text x="20" y="278">                            <tspan fill="#ef4444" font-weight="700">VERDICT: FAIL</tspan></text>
    <text x="20" y="296">                            <tspan fill="#ef4444">═══════════════════════════════════════</tspan></text>
    <text x="20" y="314" fill="#fca5a5">  Fix the 2 stubs and re-run /dod:verify.</text>

    <!-- divider -->
    <line x1="20" y1="338" x2="900" y2="338" stroke="#1f2937" stroke-dasharray="4 4"/>

    <text x="20" y="362" fill="#94a3b8"><tspan fill="#7dd3a8">$</tspan> # fix the stub: implement gateway call + add the test</text>
    <text x="20" y="380"><tspan fill="#7dd3a8">$</tspan> /dod:verify</text>

    <text x="20" y="404" fill="#94a3b8">═════════════════════════════════════════════════════════════════════</text>
    <text x="20" y="422" fill="#e6edf6" font-weight="700">DoD-Guard verify  (project: my-api, runner: jest)</text>
    <text x="20" y="440" fill="#94a3b8">═════════════════════════════════════════════════════════════════════</text>

    <text x="20" y="464"><tspan fill="#22c55e">[1/5]</tspan> Snapshot      branch=feature/refund  HEAD=8b7ef02  dirty=yes</text>
    <text x="20" y="482"><tspan fill="#22c55e">[2/5]</tspan> Stubs         <tspan fill="#22c55e">✓ 0 issue(s)</tspan></text>
    <text x="20" y="500"><tspan fill="#22c55e">[3/5]</tspan> Tests         26 passed, 0 failed (4.7s)</text>
    <text x="20" y="518"><tspan fill="#22c55e">[4/5]</tspan> E2E probe     curl POST /refund/abc123 → 200  evidence: refund_id=ref_4a</text>
    <text x="20" y="536"><tspan fill="#22c55e">[5/5]</tspan> Verdict       <tspan fill="#22c55e">═══════════════════════════════════════</tspan></text>
    <text x="20" y="554">                            <tspan fill="#22c55e" font-weight="700">VERDICT: PASS</tspan></text>
    <text x="20" y="572">                            <tspan fill="#22c55e">═══════════════════════════════════════</tspan></text>
    <text x="20" y="592" fill="#86efac">  Verify marker refreshed; you can now `git commit` within the TTL.</text>

  </g>
</svg>
