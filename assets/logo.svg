<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="DoD-Guard logo">
  <title>DoD-Guard</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1623"/>
      <stop offset="1" stop-color="#1a2333"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="40" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="256" height="256" rx="40" fill="none" stroke="#2a3a55" stroke-width="2"/>

  <!-- inner shield silhouette -->
  <path d="M128 36 L196 60 L196 134 C196 178 165 210 128 224 C91 210 60 178 60 134 L60 60 Z"
        fill="none" stroke="#3b4f72" stroke-width="2"/>

  <!-- DoD wordmark -->
  <text x="128" y="138" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', monospace"
        font-size="56" font-weight="700" fill="#e6edf6" text-anchor="middle"
        letter-spacing="-2">DoD</text>

  <!-- barrier bar (horizontal) -->
  <rect x="56" y="158" width="144" height="10" rx="5" fill="url(#barGrad)"/>

  <!-- two underscores echoing a stopped cursor -->
  <rect x="92" y="180" width="22" height="4" rx="2" fill="#2dd4bf" opacity="0.7"/>
  <rect x="142" y="180" width="22" height="4" rx="2" fill="#2dd4bf" opacity="0.7"/>
</svg>
